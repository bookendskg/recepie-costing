# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploys the Vite + React SPA as a static site backed by Supabase.
services:
  - type: web
    name: recipe-costing-system
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    # Vite reads VITE_* at BUILD time — set these in the Render dashboard
    # (Environment) before the first deploy, or sync: false will prompt for them.
    envVars:
      # Firebase web config — primary auth. Public-by-design (not secrets), but
      # Vite inlines them at BUILD time, so set them before the first deploy.
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      # Supabase — data layer / fallback auth.
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    # SPA fallback so React Router deep links resolve to index.html.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
